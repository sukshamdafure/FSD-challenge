<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAVITY FLIP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #05050f;
    --primary: #00f5ff;
    --secondary: #ff006e;
    --accent: #ffe600;
    --dim: #0a0a1a;
    --glow: 0 0 20px rgba(0,245,255,0.6);
    --glow2: 0 0 20px rgba(255,0,110,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    color: var(--primary);
  }

  /* Star background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(0,245,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,0,110,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 50%, rgba(0,245,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, rgba(255,230,0,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 30%, rgba(0,245,255,0.3) 0%, transparent 100%);
    pointer-events: none;
  }

  #header {
    text-align: center;
    margin-bottom: 16px;
    position: relative;
  }

  #header h1 {
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--primary);
    text-shadow: var(--glow), 0 0 60px rgba(0,245,255,0.3);
    animation: pulse 2s ease-in-out infinite;
  }

  #header h1 span { color: var(--secondary); text-shadow: var(--glow2); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }

  #scoreboard {
    display: flex;
    gap: 48px;
    margin-bottom: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
  }

  .score-item { text-align: center; }
  .score-label { color: rgba(0,245,255,0.5); font-size: 0.65rem; letter-spacing: 0.2em; }
  .score-value {
    color: var(--accent);
    font-size: 1.4rem;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,230,0,0.7);
    transition: transform 0.1s;
  }
  .score-value.bump { transform: scale(1.4); }

  #game-wrapper {
    position: relative;
    border: 1px solid rgba(0,245,255,0.3);
    box-shadow: var(--glow), inset 0 0 40px rgba(0,0,0,0.8);
  }

  canvas {
    display: block;
    background: var(--dim);
  }

  /* Scanline overlay */
  #game-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,5,15,0.88);
    z-index: 20;
    backdrop-filter: blur(2px);
    transition: opacity 0.3s;
  }

  #overlay.hidden { display: none; }

  #overlay h2 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--secondary);
    text-shadow: var(--glow2);
    margin-bottom: 8px;
  }

  #overlay p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: rgba(0,245,255,0.6);
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }

  #overlay .big-score {
    font-size: 3rem;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(255,230,0,0.8);
    margin: 8px 0;
  }

  #start-btn {
    margin-top: 20px;
    padding: 12px 40px;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--primary);
    border: none;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.2s;
    box-shadow: var(--glow);
  }

  #start-btn:hover {
    background: var(--accent);
    box-shadow: 0 0 20px rgba(255,230,0,0.7);
    transform: scale(1.05);
  }

  #instructions {
    margin-top: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: rgba(0,245,255,0.4);
    text-align: center;
    letter-spacing: 0.1em;
    line-height: 1.8;
  }

  #gravity-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: rgba(0,245,255,0.5);
    letter-spacing: 0.1em;
  }

  .grav-arrow {
    width: 20px; height: 20px;
    border: 1.5px solid var(--primary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: transform 0.3s;
    box-shadow: var(--glow);
  }
</style>
</head>
<body>

<div id="header">
  <h1>GRAVITY <span>FLIP</span></h1>
</div>

<div id="scoreboard">
  <div class="score-item">
    <div class="score-label">SCORE</div>
    <div class="score-value" id="score-display">0</div>
  </div>
  <div class="score-item">
    <div class="score-label">BEST</div>
    <div class="score-value" id="best-display">0</div>
  </div>
  <div class="score-item">
    <div class="score-label">FLIPS</div>
    <div class="score-value" id="flip-display">0</div>
  </div>
</div>

<div id="game-wrapper">
  <canvas id="gameCanvas" width="700" height="320"></canvas>

  <div id="overlay">
    <h2 id="overlay-title">GRAVITY FLIP</h2>
    <p id="overlay-sub">AVOID THE OBSTACLES. SURVIVE.</p>
    <div class="big-score" id="overlay-score" style="display:none"></div>
    <button id="start-btn" onclick="startGame()">LAUNCH</button>
    <div id="instructions">
      SPACE / CLICK / TAP → FLIP GRAVITY<br>
      CYAN CUBE = YOU &nbsp;|&nbsp; RED PILLARS = DEATH<br>
      GOLD RINGS = +5 BONUS POINTS
    </div>
  </div>
</div>

<div id="gravity-indicator">
  <div class="grav-arrow" id="grav-arrow">▼</div>
  <span id="grav-label">GRAVITY: DOWN</span>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const COLORS = {
  bg: '#0a0a1a',
  player: '#00f5ff',
  playerGlow: 'rgba(0,245,255,0.35)',
  obstacle: '#ff006e',
  obstacleGlow: 'rgba(255,0,110,0.4)',
  ring: '#ffe600',
  ringGlow: 'rgba(255,230,0,0.5)',
  trail: 'rgba(0,245,255,0.15)',
  grid: 'rgba(0,245,255,0.04)',
  ground: 'rgba(0,245,255,0.18)',
  particle: ['#00f5ff', '#ff006e', '#ffe600', '#ffffff'],
};

let state = 'idle';
let score = 0, best = 0, flips = 0;
let gravDir = 1; // 1 = down, -1 = up
let speed = 3.5;
let frame = 0;
let animId;

const player = { x: 100, y: H/2, vy: 0, size: 22, rotation: 0 };
const GRAVITY = 0.42;
const FLIP_FORCE = -7.5;
const GROUND_Y = H - 30;
const CEIL_Y = 30;

let obstacles = [];
let rings = [];
let particles = [];
let trail = [];
let bgStars = [];

// Init stars
for (let i = 0; i < 60; i++) {
  bgStars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, speed: Math.random()*0.5+0.2, alpha: Math.random()*0.5+0.2 });
}

function spawnObstacle() {
  const gapH = Math.max(100, 165 - score*0.3);
  const gapY = Math.random() * (H - 60 - gapH) + 30;
  const w = 28 + Math.random()*14;
  obstacles.push({ x: W + 20, topH: gapY - 30, botY: gapY + gapH, width: w, passed: false });
}

function spawnRing() {
  const y = Math.random() * (H - 100) + 50;
  rings.push({ x: W + 20, y, r: 14, alpha: 1, pulse: 0, collected: false });
}

function emitParticles(x, y, color, count=10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd,
      life: 1,
      decay: Math.random()*0.04+0.025,
      r: Math.random()*3+1,
      color: color || COLORS.particle[Math.floor(Math.random()*COLORS.particle.length)]
    });
  }
}

function flipGravity() {
  if (state !== 'playing') return;
  gravDir *= -1;
  player.vy = FLIP_FORCE * gravDir;
  flips++;
  emitParticles(player.x, player.y, COLORS.playerGlow, 8);
  updateUI();

  document.getElementById('grav-arrow').textContent = gravDir === 1 ? '▼' : '▲';
  document.getElementById('grav-label').textContent = gravDir === 1 ? 'GRAVITY: DOWN' : 'GRAVITY: UP';
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  state = 'playing';
  score = 0; flips = 0;
  gravDir = 1;
  speed = 3.5;
  player.y = H/2; player.vy = 0; player.rotation = 0;
  obstacles = []; rings = []; particles = []; trail = [];
  frame = 0;

  document.getElementById('grav-arrow').textContent = '▼';
  document.getElementById('grav-label').textContent = 'GRAVITY: DOWN';
  updateUI();
  cancelAnimationFrame(animId);
  loop();
}

function gameOver() {
  state = 'dead';
  emitParticles(player.x, player.y, '#ff006e', 30);
  if (score > best) best = score;

  const ol = document.getElementById('overlay');
  ol.classList.remove('hidden');
  document.getElementById('overlay-title').textContent = 'GAME OVER';
  document.getElementById('overlay-sub').textContent = flips + ' GRAVITY FLIPS';
  const sc = document.getElementById('overlay-score');
  sc.style.display = 'block';
  sc.textContent = score;
  document.getElementById('start-btn').textContent = 'RETRY';
  updateUI();
}

function updateUI() {
  const sd = document.getElementById('score-display');
  sd.textContent = score;
  sd.classList.remove('bump');
  void sd.offsetWidth;
  sd.classList.add('bump');
  document.getElementById('best-display').textContent = best;
  document.getElementById('flip-display').textContent = flips;
}

function rectCollide(px, py, ps, ox, oy, ow, oh) {
  const half = ps/2 * 0.75;
  return px+half > ox && px-half < ox+ow && py+half > oy && py-half < oy+oh;
}

function loop() {
  animId = requestAnimationFrame(loop);
  frame++;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 1;
  const gridSpacing = 50;
  for (let x = (frame * speed % gridSpacing); x < W; x += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Stars
  bgStars.forEach(s => {
    s.x -= s.speed * (speed/3.5);
    if (s.x < 0) { s.x = W; s.y = Math.random()*H; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fill();
  });

  // Ground & ceiling bars
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, 0, W, CEIL_Y);
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Ground glow line
  ctx.strokeStyle = 'rgba(0,245,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, CEIL_Y); ctx.lineTo(W, CEIL_Y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();

  if (state === 'playing') {
    // Physics
    player.vy += GRAVITY * gravDir;
    player.vy = Math.max(-10, Math.min(10, player.vy));
    player.y += player.vy;
    player.rotation += 3 * gravDir;

    // Clamp
    if (player.y - player.size/2 < CEIL_Y) { player.y = CEIL_Y + player.size/2; player.vy = 1; }
    if (player.y + player.size/2 > GROUND_Y) { player.y = GROUND_Y - player.size/2; player.vy = -1; }

    // Trail
    trail.push({ x: player.x, y: player.y, t: 1 });
    if (trail.length > 20) trail.shift();

    // Spawn
    if (frame % Math.max(60, 100 - Math.floor(score/5)) === 0) spawnObstacle();
    if (frame % 180 === 90) spawnRing();

    // Speed up
    speed = 3.5 + score * 0.035;

    // Score ticker
    if (frame % 8 === 0) { score++; updateUI(); }
  }

  // Trail
  trail.forEach((t, i) => {
    const alpha = (i / trail.length) * 0.4;
    ctx.fillStyle = `rgba(0,245,255,${alpha})`;
    const s = (i/trail.length) * player.size * 0.7;
    ctx.fillRect(t.x - s/2, t.y - s/2, s, s);
  });

  // Obstacles
  obstacles.forEach((ob, i) => {
    ob.x -= speed;

    // Top pillar
    const grad1 = ctx.createLinearGradient(ob.x, 0, ob.x + ob.width, 0);
    grad1.addColorStop(0, 'rgba(255,0,110,0.15)');
    grad1.addColorStop(0.5, 'rgba(255,0,110,0.9)');
    grad1.addColorStop(1, 'rgba(255,0,110,0.15)');

    ctx.fillStyle = grad1;
    ctx.fillRect(ob.x, CEIL_Y, ob.width, ob.topH);

    // Bottom pillar
    ctx.fillRect(ob.x, ob.botY, ob.width, GROUND_Y - ob.botY);

    // Glow edges
    ctx.strokeStyle = 'rgba(255,0,110,0.8)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(ob.x, CEIL_Y, ob.width, ob.topH);
    ctx.strokeRect(ob.x, ob.botY, ob.width, GROUND_Y - ob.botY);

    // Tip glow
    ctx.fillStyle = '#ff006e';
    ctx.fillRect(ob.x, ob.topH + CEIL_Y - 3, ob.width, 4);
    ctx.fillRect(ob.x, ob.botY - 1, ob.width, 4);

    // Score check
    if (!ob.passed && ob.x + ob.width < player.x) {
      ob.passed = true;
      score += 2;
      emitParticles(ob.x + ob.width, H/2, COLORS.ring, 6);
      updateUI();
    }

    // Collision
    if (state === 'playing') {
      if (rectCollide(player.x, player.y, player.size, ob.x, CEIL_Y, ob.width, ob.topH) ||
          rectCollide(player.x, player.y, player.size, ob.x, ob.botY, ob.width, GROUND_Y - ob.botY)) {
        gameOver();
      }
    }
  });
  obstacles = obstacles.filter(o => o.x > -50);

  // Rings
  rings.forEach((r, i) => {
    r.x -= speed;
    r.pulse += 0.06;

    if (!r.collected) {
      const grd = ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, r.r*2.5);
      grd.addColorStop(0, `rgba(255,230,0,${0.2 + Math.sin(r.pulse)*0.1})`);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(r.x, r.y, r.r*2.5, 0, Math.PI*2); ctx.fill();

      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r + Math.sin(r.pulse)*2, 0, Math.PI*2);
      ctx.strokeStyle = '#ffe600';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Collect
      if (state === 'playing') {
        const dx = player.x - r.x, dy = player.y - r.y;
        if (Math.sqrt(dx*dx+dy*dy) < r.r + player.size/2) {
          r.collected = true;
          score += 5;
          emitParticles(r.x, r.y, '#ffe600', 18);
          updateUI();
        }
      }
    }
  });
  rings = rings.filter(r => r.x > -50 && !r.collected);

  // Player
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.rotation * Math.PI / 180);

  // Glow
  const pGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, player.size*1.5);
  pGrad.addColorStop(0, 'rgba(0,245,255,0.4)');
  pGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = pGrad;
  ctx.fillRect(-player.size*1.5, -player.size*1.5, player.size*3, player.size*3);

  // Body
  const half = player.size/2;
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 2;
  ctx.fillStyle = 'rgba(0,245,255,0.15)';
  ctx.beginPath();
  ctx.moveTo(0, -half);
  ctx.lineTo(half, -half*0.3);
  ctx.lineTo(half, half*0.3);
  ctx.lineTo(0, half);
  ctx.lineTo(-half, half*0.3);
  ctx.lineTo(-half, -half*0.3);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Center dot
  ctx.fillStyle = '#00f5ff';
  ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();

  ctx.restore();

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1 * gravDir;
    p.life -= p.decay;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
  particles = particles.filter(p => p.life > 0);

  // HUD speedometer
  const speedBar = Math.min((speed - 3.5) / 5, 1);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(W - 90, 8, 80, 8);
  const sGrad = ctx.createLinearGradient(W-90, 0, W-10, 0);
  sGrad.addColorStop(0, '#00f5ff');
  sGrad.addColorStop(1, '#ff006e');
  ctx.fillStyle = sGrad;
  ctx.fillRect(W-90, 8, speedBar * 80, 8);
  ctx.strokeStyle = 'rgba(0,245,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(W-90, 8, 80, 8);

  ctx.fillStyle = 'rgba(0,245,255,0.5)';
  ctx.font = '7px Share Tech Mono';
  ctx.fillText('SPEED', W - 90, 6);
}

// Controls
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flipGravity(); }
});
canvas.addEventListener('click', flipGravity);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flipGravity(); });

// Draw idle frame
(function idleFrame() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, 0, W, CEIL_Y);
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = 'rgba(0,245,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, CEIL_Y); ctx.lineTo(W, CEIL_Y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
})();
</script>
</body>
</html>
