<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarkFlow — Markdown Editor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #f0883e;
    --red: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; height: 52px; flex-shrink: 0;
  }
  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; font-weight: 500; color: var(--accent); }
  .logo span { color: var(--muted); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .mode-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
    padding: 5px 12px; border-radius: 4px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all .15s;
    letter-spacing: .05em;
  }
  .mode-btn:hover { color: var(--text); border-color: var(--muted); }
  .mode-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 500; }
  .save-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
    padding: 5px 14px; border-radius: 4px;
    background: var(--green); color: var(--bg);
    border: none; cursor: pointer; font-weight: 500;
    transition: opacity .15s; letter-spacing: .05em;
  }
  .save-btn:hover { opacity: .85; }

  .toolbar {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 2px; padding: 6px 1rem;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .tb { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
    padding: 4px 10px; border-radius: 3px; border: 1px solid transparent;
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all .12s; }
  .tb:hover { background: var(--surface); color: var(--text); border-color: var(--border); }
  .tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  .workspace {
    display: flex; flex: 1; overflow: hidden;
  }
  .pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .pane + .pane { border-left: 1px solid var(--border); }
  .pane-header {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem;
    color: var(--muted); padding: 8px 14px;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    letter-spacing: .06em; text-transform: uppercase; flex-shrink: 0;
  }
  .line-count { color: var(--muted); }
  textarea {
    flex: 1; resize: none; border: none; outline: none;
    background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem;
    line-height: 1.75; padding: 1.5rem;
    tab-size: 2;
  }
  textarea::selection { background: rgba(88,166,255,.25); }
  .preview-wrap { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; background: var(--bg); }

  /* Preview styles */
  .preview-wrap h1 { font-size: 1.8rem; font-weight: 500; padding-bottom: .6rem; border-bottom: 1px solid var(--border); margin: 0 0 1rem; color: var(--text); }
  .preview-wrap h2 { font-size: 1.3rem; font-weight: 500; margin: 1.5rem 0 .7rem; padding-bottom: .4rem; border-bottom: 1px solid var(--border); color: var(--text); }
  .preview-wrap h3 { font-size: 1.05rem; font-weight: 500; margin: 1.2rem 0 .5rem; color: var(--text); }
  .preview-wrap p { margin: 0 0 .8rem; line-height: 1.75; color: #c9d1d9; font-size: .93rem; }
  .preview-wrap ul, .preview-wrap ol { margin: 0 0 .8rem 1.5rem; color: #c9d1d9; font-size: .93rem; }
  .preview-wrap li { margin: .3rem 0; line-height: 1.7; }
  .preview-wrap code { font-family: 'IBM Plex Mono', monospace; font-size: .82rem; background: rgba(110,118,129,.12); padding: .15em .4em; border-radius: 3px; color: var(--orange); }
  .preview-wrap pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.1rem; overflow-x: auto; margin: 0 0 1rem; }
  .preview-wrap pre code { background: none; color: var(--green); padding: 0; border-radius: 0; font-size: .85rem; }
  .preview-wrap blockquote { border-left: 3px solid var(--accent); padding: .5rem 1rem; margin: 0 0 1rem; background: rgba(88,166,255,.05); border-radius: 0 4px 4px 0; }
  .preview-wrap blockquote p { color: var(--muted); margin: 0; }
  .preview-wrap table { width: 100%; border-collapse: collapse; margin: 0 0 1rem; font-size: .88rem; }
  .preview-wrap th { background: var(--surface2); color: var(--text); font-weight: 500; padding: .6rem 1rem; border: 1px solid var(--border); text-align: left; }
  .preview-wrap td { padding: .5rem 1rem; border: 1px solid var(--border); color: #c9d1d9; }
  .preview-wrap tr:nth-child(even) td { background: rgba(255,255,255,.02); }
  .preview-wrap a { color: var(--accent); text-decoration: none; }
  .preview-wrap a:hover { text-decoration: underline; }
  .preview-wrap hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .preview-wrap strong { font-weight: 500; color: var(--text); }

  .statusbar {
    background: var(--accent); color: var(--bg);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem;
    padding: 4px 1rem; display: flex; gap: 1.5rem; flex-shrink: 0;
    letter-spacing: .04em;
  }
  .pane.hidden { display: none; }

  @media (max-width: 700px) {
    .workspace { flex-direction: column; }
    .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<header>
  <div class="logo">Mark<span>Flow</span></div>
  <div class="header-actions">
    <button class="mode-btn active" id="btn-split" onclick="setMode('split')">Split</button>
    <button class="mode-btn" id="btn-edit" onclick="setMode('edit')">Edit</button>
    <button class="mode-btn" id="btn-preview" onclick="setMode('preview')">Preview</button>
    <button class="save-btn" onclick="saveFile()">Export</button>
  </div>
</header>
<div class="toolbar">
  <button class="tb" onclick="ins('**','**')"><b>B</b></button>
  <button class="tb" onclick="ins('*','*')"><i>I</i></button>
  <button class="tb" onclick="ins('~~','~~')"><s>S</s></button>
  <div class="tb-sep"></div>
  <button class="tb" onclick="insLine('# ')">H1</button>
  <button class="tb" onclick="insLine('## ')">H2</button>
  <button class="tb" onclick="insLine('### ')">H3</button>
  <div class="tb-sep"></div>
  <button class="tb" onclick="insLine('- ')">• List</button>
  <button class="tb" onclick="insLine('1. ')">1. List</button>
  <button class="tb" onclick="insLine('> ')">Quote</button>
  <div class="tb-sep"></div>
  <button class="tb" onclick="ins('\`','\`')">Code</button>
  <button class="tb" onclick="insLine('\`\`\`\n','\n\`\`\`')">Block</button>
  <button class="tb" onclick="ins('[','](url)')">Link</button>
  <div class="tb-sep"></div>
  <button class="tb" onclick="insLine('---')">HR</button>
  <button class="tb" onclick="insTable()">Table</button>
</div>
<div class="workspace" id="workspace">
  <div class="pane" id="editor-pane">
    <div class="pane-header">
      <span>editor.md</span>
      <span class="line-count" id="lcount">1 line</span>
    </div>
    <textarea id="editor" oninput="render()" spellcheck="false"></textarea>
  </div>
  <div class="pane" id="preview-pane">
    <div class="pane-header"><span>preview</span><span id="wcount">0 words</span></div>
    <div class="preview-wrap" id="preview"></div>
  </div>
</div>
<div class="statusbar">
  <span id="chars">0 chars</span>
  <span id="words2">0 words</span>
  <span id="lines2">0 lines</span>
  <span id="cursorpos">Ln 1, Col 1</span>
</div>

<script>
const sample = `# MarkFlow Editor

Welcome to **MarkFlow** — a clean, distraction-free markdown editor.

## Features

- **Live preview** updates as you type
- Toolbar shortcuts for common formatting
- Export your document anytime
- Split, Edit, or Preview modes

## Code Example

\`\`\`javascript
const greet = (name) => {
  return \`Hello, \${name}! Welcome to MarkFlow.\`;
};
console.log(greet("World"));
\`\`\`

## Table Example

| Feature       | Status  | Notes              |
|---------------|---------|--------------------|
| Live Preview  | ✅ Done  | Real-time updates  |
| Export        | ✅ Done  | Downloads .md file |
| Dark Mode     | ✅ Done  | Easy on the eyes   |

> *"Writing is thinking. To write well is to think clearly."*  
> — David McCullough

---

Start editing to see the magic happen!`;

const editor = document.getElementById('editor');
editor.value = sample;

function render() {
  const md = editor.value;
  document.getElementById('preview').innerHTML = marked.parse(md);
  const lines = md.split('\n').length;
  const words = md.trim() ? md.trim().split(/\s+/).length : 0;
  const chars = md.length;
  document.getElementById('lcount').textContent = lines + ' line' + (lines!==1?'s':'');
  document.getElementById('wcount').textContent = words + ' words';
  document.getElementById('chars').textContent = chars + ' chars';
  document.getElementById('words2').textContent = words + ' words';
  document.getElementById('lines2').textContent = lines + ' lines';
}

editor.addEventListener('keyup', updateCursor);
editor.addEventListener('click', updateCursor);
function updateCursor() {
  const txt = editor.value.substring(0, editor.selectionStart);
  const ln = txt.split('\n').length;
  const col = txt.split('\n').pop().length + 1;
  document.getElementById('cursorpos').textContent = `Ln ${ln}, Col ${col}`;
}

function ins(before, after) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'text';
  editor.setRangeText(before + sel + after, s, e, 'select');
  editor.focus(); render();
}
function insLine(prefix, suffix='') {
  const s = editor.selectionStart;
  const lineStart = editor.value.lastIndexOf('\n', s-1) + 1;
  if(suffix) {
    editor.setRangeText(prefix + '\n' + suffix, s, s, 'end');
  } else {
    editor.setRangeText(prefix, lineStart, lineStart, 'end');
  }
  editor.focus(); render();
}
function insTable() {
  const t = `\n| Column 1 | Column 2 | Column 3 |\n|----------|----------|----------|\n| Cell 1   | Cell 2   | Cell 3   |\n`;
  const s = editor.selectionStart;
  editor.setRangeText(t, s, s, 'end');
  editor.focus(); render();
}

let mode = 'split';
function setMode(m) {
  mode = m;
  ['split','edit','preview'].forEach(id => document.getElementById('btn-'+id).classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  const ep = document.getElementById('editor-pane');
  const pp = document.getElementById('preview-pane');
  ep.classList.remove('hidden'); pp.classList.remove('hidden');
  if(m==='edit') pp.classList.add('hidden');
  if(m==='preview') ep.classList.add('hidden');
}

function saveFile() {
  const blob = new Blob([editor.value], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'document.md';
  a.click();
}

render();
</script>
</body>
</html>
