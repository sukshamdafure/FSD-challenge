<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SNIP — URL Shortener</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1318;
    --surface2: #141a21;
    --border: #1e2a35;
    --green: #00e5a0;
    --green-dim: rgba(0,229,160,0.12);
    --green-glow: rgba(0,229,160,0.35);
    --red: #ff4b6e;
    --muted: #4a6070;
    --text: #c8dce8;
    --white: #eaf4fc;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
    overflow-x: hidden;
  }

  /* ── Grid BG ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body > * { position: relative; z-index: 1; }

  /* ── Header ──────────────────────────────── */
  header {
    width: 100%;
    max-width: 700px;
    padding: 56px 0 40px;
    text-align: center;
    animation: slideDown .6s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 800;
    color: var(--white);
    letter-spacing: -.03em;
    line-height: 1;
    position: relative;
    display: inline-block;
  }
  .logo span { color: var(--green); }
  .logo::after {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    margin-top: 8px;
    animation: scanline 3s linear infinite;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 14px;
  }

  /* ── Main Box ────────────────────────────── */
  .box {
    width: 100%;
    max-width: 700px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    animation: slideUp .55s .1s ease both;
  }

  .box-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
  .dot:nth-child(1) { background: #ff5f57; }
  .dot:nth-child(2) { background: #febc2e; }
  .dot:nth-child(3) { background: #28c840; }
  .box-title {
    margin-left: auto;
    font-size: 10px;
    letter-spacing: .2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .box-body { padding: 28px 28px 24px; }

  /* ── Input Row ───────────────────────────── */
  .input-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-row:focus-within {
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-dim), 0 0 20px var(--green-dim);
  }

  .input-prefix {
    padding: 0 14px;
    background: var(--surface2);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    color: var(--green);
    font-size: 13px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #url-input {
    flex: 1;
    padding: 14px 16px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }
  #url-input::placeholder { color: var(--muted); }

  .btn-shorten {
    padding: 14px 22px;
    background: var(--green);
    color: var(--bg);
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, transform .1s;
    flex-shrink: 0;
  }
  .btn-shorten:hover { background: #00ffb3; }
  .btn-shorten:active { transform: scale(.97); }

  .error-msg {
    color: var(--red);
    font-size: 11px;
    margin-top: 8px;
    min-height: 16px;
    letter-spacing: .05em;
  }

  /* ── Result ──────────────────────────────── */
  .result {
    margin-top: 20px;
    background: var(--green-dim);
    border: 1px solid rgba(0,229,160,.25);
    border-radius: 4px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .3s, transform .3s;
    pointer-events: none;
  }
  .result.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .result-icon { color: var(--green); font-size: 18px; flex-shrink: 0; }
  .result-link {
    flex: 1;
    color: var(--green);
    font-size: 14px;
    word-break: break-all;
    cursor: pointer;
    text-decoration: none;
  }
  .result-link:hover { text-decoration: underline; }

  .btn-copy {
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--green);
    border-radius: 3px;
    color: var(--green);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: background .15s, color .15s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .btn-copy:hover, .btn-copy.copied {
    background: var(--green);
    color: var(--bg);
  }

  /* ── Stats Strip ─────────────────────────── */
  .stats-strip {
    display: flex;
    border-top: 1px solid var(--border);
  }
  .stat {
    flex: 1;
    text-align: center;
    padding: 14px 0;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat .n {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--green);
    line-height: 1;
  }
  .stat .l {
    font-size: 9px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── History ─────────────────────────────── */
  .history {
    width: 100%;
    max-width: 700px;
    margin-top: 28px;
    animation: slideUp .55s .2s ease both;
  }
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 2px;
  }
  .history-header h3 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  #history-list { display: flex; flex-direction: column; gap: 8px; }

  .h-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideUp .3s ease both;
    transition: border-color .2s;
  }
  .h-item:hover { border-color: var(--green); }

  .h-index {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    width: 20px;
    text-align: right;
  }
  .h-links { flex: 1; min-width: 0; }
  .h-short {
    color: var(--green);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    text-decoration: none;
  }
  .h-short:hover { text-decoration: underline; }
  .h-original {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .h-clicks {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    text-align: right;
  }
  .h-clicks span { color: var(--green); font-weight: 700; font-size: 12px; display: block; }
  .btn-del {
    background: none;
    border: none;
    color: var(--border);
    font-size: 14px;
    cursor: pointer;
    transition: color .15s;
    flex-shrink: 0;
    padding: 0 4px;
  }
  .btn-del:hover { color: var(--red); }

  .empty {
    text-align: center;
    padding: 32px 0;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: .1em;
  }

  /* ── QR Modal ────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(8,12,16,.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    transform: scale(.9);
    transition: transform .25s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--white);
    margin-bottom: 20px;
  }
  #qr-canvas { border-radius: 4px; }
  .modal-url { font-size: 11px; color: var(--muted); margin-top: 12px; word-break: break-all; }
  .btn-close-modal {
    margin-top: 18px;
    padding: 9px 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-close-modal:hover { border-color: var(--green); color: var(--green); }

  /* ── Animations ──────────────────────────── */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scanline {
    0%   { opacity: .4; }
    50%  { opacity: 1; }
    100% { opacity: .4; }
  }
  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0; }
  }
  .cursor { animation: blink 1s step-end infinite; }

  /* ── Responsive ─────────────────────────── */
  @media (max-width: 520px) {
    .input-prefix { display: none; }
    .btn-shorten { padding: 14px 14px; font-size: 11px; }
    .h-clicks { display: none; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">SN<span>I</span>P<span class="cursor">_</span></div>
  <p class="tagline">// Paste long. Share short. Done.</p>
</header>

<!-- Main Box -->
<div class="box">
  <div class="box-bar">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span class="box-title">url-shortener v1.0</span>
  </div>

  <div class="box-body">
    <div class="input-row">
      <span class="input-prefix">https://</span>
      <input type="text" id="url-input" placeholder="paste your long URL here…" autocomplete="off"/>
      <button class="btn-shorten" onclick="shorten()">SNIP →</button>
    </div>
    <div class="error-msg" id="error-msg"></div>

    <div class="result" id="result">
      <span class="result-icon">⚡</span>
      <a class="result-link" id="result-link" href="#" target="_blank"></a>
      <button class="btn-copy" id="btn-copy" onclick="copyResult()">COPY</button>
      <button class="btn-copy" style="margin-left:4px" onclick="showQR()">QR</button>
    </div>
  </div>

  <div class="stats-strip">
    <div class="stat"><div class="n" id="s-total">0</div><div class="l">Links</div></div>
    <div class="stat"><div class="n" id="s-clicks">0</div><div class="l">Clicks</div></div>
    <div class="stat"><div class="n" id="s-saved">0</div><div class="l">Chars Saved</div></div>
  </div>
</div>

<!-- History -->
<div class="history">
  <div class="history-header">
    <h3>// History</h3>
    <button class="btn-clear" onclick="clearAll()">CLEAR ALL</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="qr-modal" onclick="closeQR(event)">
  <div class="modal">
    <h3>QR Code</h3>
    <canvas id="qr-canvas" width="200" height="200"></canvas>
    <p class="modal-url" id="qr-url"></p>
    <button class="btn-close-modal" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// ── Storage ─────────────────────────────────
let links = JSON.parse(localStorage.getItem('snip_links') || '[]');
// Each: { id, code, original, short, clicks, charsSaved, date }

let currentShort = '';

// ── Shorten ──────────────────────────────────
function shorten() {
  const raw = document.getElementById('url-input').value.trim();
  const err = document.getElementById('error-msg');
  err.textContent = '';

  if (!raw) { err.textContent = '// ERROR: no URL provided'; return; }

  let url = raw;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  try { new URL(url); } catch {
    err.textContent = '// ERROR: invalid URL format';
    return;
  }

  // check duplicate
  const existing = links.find(l => l.original === url);
  if (existing) {
    showResult(existing.short);
    currentShort = existing.short;
    return;
  }

  const code = genCode();
  const short = `snip.ly/${code}`;
  const entry = {
    id: Date.now(),
    code,
    original: url,
    short,
    clicks: 0,
    charsSaved: url.length - short.length,
    date: new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short' })
  };

  links.unshift(entry);
  save();
  currentShort = short;
  showResult(short);
  renderHistory();
  updateStats();
  document.getElementById('url-input').value = '';
}

function genCode() {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let c = '';
  for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

function showResult(short) {
  const r = document.getElementById('result');
  const a = document.getElementById('result-link');
  a.textContent = short;
  a.href = '#';
  a.onclick = (e) => { e.preventDefault(); trackClick(short); };
  r.classList.add('visible');
  document.getElementById('btn-copy').textContent = 'COPY';
  document.getElementById('btn-copy').classList.remove('copied');
}

// ── Copy ──────────────────────────────────────
function copyResult() {
  if (!currentShort) return;
  navigator.clipboard.writeText('https://' + currentShort).catch(() => {});
  const btn = document.getElementById('btn-copy');
  btn.textContent = 'COPIED!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
}

function copyShort(short) {
  navigator.clipboard.writeText('https://' + short).catch(() => {});
}

// ── Track Click ───────────────────────────────
function trackClick(short) {
  const entry = links.find(l => l.short === short);
  if (entry) { entry.clicks++; save(); updateStats(); renderHistory(); }
}

// ── Delete ────────────────────────────────────
function deleteLink(id) {
  links = links.filter(l => l.id !== id);
  save();
  renderHistory();
  updateStats();
}

function clearAll() {
  if (!links.length) return;
  if (!confirm('Clear all shortened links?')) return;
  links = [];
  save();
  renderHistory();
  updateStats();
  document.getElementById('result').classList.remove('visible');
}

// ── Stats ─────────────────────────────────────
function updateStats() {
  document.getElementById('s-total').textContent = links.length;
  document.getElementById('s-clicks').textContent = links.reduce((s,l) => s+l.clicks, 0);
  const saved = links.reduce((s,l) => s + Math.max(0, l.charsSaved), 0);
  document.getElementById('s-saved').textContent = saved > 999 ? (saved/1000).toFixed(1)+'k' : saved;
}

// ── Render History ────────────────────────────
function renderHistory() {
  const list = document.getElementById('history-list');
  if (!links.length) {
    list.innerHTML = `<div class="empty">// no links yet — start snipping!</div>`;
    return;
  }
  list.innerHTML = links.map((l, i) => `
    <div class="h-item">
      <span class="h-index">${String(links.length - i).padStart(2,'0')}</span>
      <div class="h-links">
        <a class="h-short" href="#" onclick="event.preventDefault();trackClick('${esc(l.short)}');copyShort('${esc(l.short)}')">${esc(l.short)}</a>
        <div class="h-original" title="${esc(l.original)}">${esc(l.original)}</div>
      </div>
      <div class="h-clicks">
        <span>${l.clicks}</span>clicks
      </div>
      <button class="btn-del" onclick="deleteLink(${l.id})" title="Delete">✕</button>
    </div>
  `).join('');
}

// ── QR Code ───────────────────────────────────
function showQR() {
  if (!currentShort) return;
  const url = 'https://' + currentShort;
  document.getElementById('qr-url').textContent = url;
  drawQR(url);
  document.getElementById('qr-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('qr-modal').classList.remove('open');
}
function closeQR(e) {
  if (e.target === document.getElementById('qr-modal')) closeModal();
}

// Simple QR-like visual (pixel art pattern based on hash of URL)
function drawQR(url) {
  const canvas = document.getElementById('qr-canvas');
  const ctx = canvas.getContext('2d');
  const size = 200;
  const modules = 21;
  const cell = Math.floor(size / modules);
  canvas.width = canvas.height = modules * cell;

  // Generate deterministic "pattern" from URL
  let hash = 0;
  for (let i = 0; i < url.length; i++) hash = ((hash << 5) - hash) + url.charCodeAt(i);
  hash = Math.abs(hash);

  ctx.fillStyle = '#0e1318';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw cells
  for (let r = 0; r < modules; r++) {
    for (let c = 0; c < modules; c++) {
      const isCorner =
        (r < 7 && c < 7) || (r < 7 && c >= modules-7) || (r >= modules-7 && c < 7);
      let filled;
      if (isCorner) {
        // finder patterns
        const inOuter = r === 0 || r === 6 || c === 0 || c === 6 ||
                        r === modules-1 || r === modules-7 || c === modules-1 || c === modules-7;
        const inInner = (r >= 2 && r <= 4 && c >= 2 && c <= 4) ||
                        (r >= 2 && r <= 4 && c >= modules-5 && c <= modules-3) ||
                        (r >= modules-5 && r <= modules-3 && c >= 2 && c <= 4);
        filled = inOuter || inInner;
      } else {
        const idx = r * modules + c;
        const bit = (hash >> (idx % 30)) & 1;
        const bit2 = ((hash * 1103515245 + idx) >> 15) & 1;
        filled = bit ^ bit2;
      }
      if (filled) {
        ctx.fillStyle = '#00e5a0';
        ctx.fillRect(c * cell + 1, r * cell + 1, cell - 2, cell - 2);
      }
    }
  }
}

// ── Helpers ───────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function save() { localStorage.setItem('snip_links', JSON.stringify(links)); }

// ── Enter key ─────────────────────────────────
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') shorten();
});

// ── Init ──────────────────────────────────────
renderHistory();
updateStats();
</script>
</body>
</html>
